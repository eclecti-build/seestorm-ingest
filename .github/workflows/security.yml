name: security
on: [push, pull_request]
permissions:
  contents: read
jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with: { fetch-depth: 0 }
      - name: install gitleaks
        # Use the OSS CLI directly; gitleaks-action@v2 requires a paid license for org repos
        run: |
          GITLEAKS_VERSION=$(curl -sSfL https://api.github.com/repos/gitleaks/gitleaks/releases/latest | grep '"tag_name"' | sed 's/.*"v\([^"]*\)".*/\1/')
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" | tar -xz gitleaks
          sudo mv gitleaks /usr/local/bin/gitleaks
      - name: gitleaks (blocking)
        run: gitleaks detect --source=. --redact
      # go-version-file (not a floating '1.25' spec): setup-go exports
      # GOTOOLCHAIN=local, so go won't self-download the toolchain go.mod
      # requires — the installed version must satisfy it exactly. A floating
      # spec resolves to whatever 1.25.x sits in the runner toolcache, which
      # broke govulncheck when go.mod moved to 1.25.11 ahead of the cache.
      # ci.yml already reads go.mod; this keeps both on one source of truth.
      - uses: actions/setup-go@v6
        with: { go-version-file: go.mod }
      - name: govulncheck (blocking)
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...
      - name: trivy (report-only)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scanners: 'vuln,secret,misconfig'
          exit-code: '0'
