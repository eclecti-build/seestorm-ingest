name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: lint + test + build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Download modules
        run: go mod download

      - name: go vet
        run: go vet ./...

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          # Pinned to avoid CI breakage when new golangci-lint releases land.
          # Bump intentionally after verifying locally (`make lint`).
          version: v1.64.8

      - name: Test (race + coverage)
        run: go test -race -coverprofile=coverage.out ./...

      - name: Build
        run: go build ./...
