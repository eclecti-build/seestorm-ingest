name: Deploy Fleet

# PHASE A — dry-run / token-scope check. Manual-only, deploys NOTHING.
# Validates that FLY_API_TOKEN can reach all 8 fleet apps before this
# workflow is flipped to real, auto-triggered deploys (Phase D). See
# docs/fleet-deploy-automation.md and
# docs/superpowers/plans/2026-07-08-tier3-infra-maturity.md Task 2.

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: fly-deploy-fleet-main
  cancel-in-progress: false

jobs:
  check-token-scope:
    name: Verify token reaches ${{ matrix.app }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        app:
          - seestorm-ingest
          - seestorm-ingest-dixie
          - seestorm-ingest-gulf
          - seestorm-ingest-midwest
          - seestorm-ingest-mountain
          - seestorm-ingest-northeast
          - seestorm-ingest-pacific
          - seestorm-ingest-plains
    steps:
      - uses: superfly/flyctl-actions/setup-flyctl@ed8efb33836e8b2096c7fd3ba1c8afe303ebbff1
      - name: flyctl status (read-only — proves auth reaches this app)
        run: flyctl status -a ${{ matrix.app }}
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
