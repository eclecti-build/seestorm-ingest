app = "seestorm-ingest"
primary_region = "ord"  # Chicago - closest to Wisconsin

[build]

[env]
  POLL_INTERVAL = "30s"
  SNAPSHOT_DIR = "/data/snapshots"

[mounts]
  source = "seestorm_data"
  destination = "/data"

[checks]
  [checks.ingest_health]
    type = "http"
    port = 8080
    method = "get"
    path = "/healthz"
    interval = "15s"
    timeout = "5s"
    grace_period = "60s"
